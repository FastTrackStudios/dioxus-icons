<style>
.dioxus-icons-widget{--dxi-bg:#ffffff;--dxi-panel:#fafafa;--dxi-border:rgba(24,24,27,0.08);--dxi-border-strong:rgba(24,24,27,0.16);--dxi-text:#18181b;--dxi-text-muted:#52525b;--dxi-text-subtle:#a1a1aa;--dxi-accent:#ea580c;--dxi-accent-hover:#c2410c;--dxi-accent-soft:rgba(234,88,12,0.10);--dxi-accent-ring:rgba(234,88,12,0.28);margin:18px 0 26px;padding:16px;border-radius:14px;background:var(--dxi-panel);box-shadow:inset 0 0 0 1px var(--dxi-border);color:var(--dxi-text);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;}
@media (prefers-color-scheme:dark){.dioxus-icons-widget{--dxi-bg:#18181b;--dxi-panel:#0f0f11;--dxi-border:rgba(250,250,250,0.08);--dxi-border-strong:rgba(250,250,250,0.16);--dxi-text:#fafafa;--dxi-text-muted:#a1a1aa;--dxi-text-subtle:#71717a;--dxi-accent:#fb923c;--dxi-accent-hover:#f97316;--dxi-accent-soft:rgba(251,146,60,0.14);--dxi-accent-ring:rgba(251,146,60,0.32);}}
html[data-theme="dark"] .dioxus-icons-widget,html[data-theme="ayu"] .dioxus-icons-widget{--dxi-bg:#18181b;--dxi-panel:#0f0f11;--dxi-border:rgba(250,250,250,0.08);--dxi-border-strong:rgba(250,250,250,0.16);--dxi-text:#fafafa;--dxi-text-muted:#a1a1aa;--dxi-text-subtle:#71717a;--dxi-accent:#fb923c;--dxi-accent-hover:#f97316;--dxi-accent-soft:rgba(251,146,60,0.14);--dxi-accent-ring:rgba(251,146,60,0.32);}
html[data-theme="light"] .dioxus-icons-widget{--dxi-bg:#ffffff;--dxi-panel:#fafafa;--dxi-border:rgba(24,24,27,0.08);--dxi-border-strong:rgba(24,24,27,0.16);--dxi-text:#18181b;--dxi-text-muted:#52525b;--dxi-text-subtle:#a1a1aa;--dxi-accent:#ea580c;--dxi-accent-hover:#c2410c;--dxi-accent-soft:rgba(234,88,12,0.10);--dxi-accent-ring:rgba(234,88,12,0.28);}
.dioxus-icons-related{--dxi-bg:#ffffff;--dxi-panel:#fafafa;--dxi-border:rgba(24,24,27,0.08);--dxi-border-strong:rgba(24,24,27,0.16);--dxi-text:#18181b;--dxi-text-muted:#52525b;--dxi-accent:#ea580c;--dxi-icon-filter:none;display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 24px;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;}
@media (prefers-color-scheme:dark){.dioxus-icons-related{--dxi-bg:#18181b;--dxi-panel:#0f0f11;--dxi-border:rgba(250,250,250,0.08);--dxi-border-strong:rgba(250,250,250,0.16);--dxi-text:#fafafa;--dxi-text-muted:#a1a1aa;--dxi-accent:#fb923c;--dxi-icon-filter:invert(1);}}
html[data-theme="dark"] .dioxus-icons-related,html[data-theme="ayu"] .dioxus-icons-related{--dxi-bg:#18181b;--dxi-panel:#0f0f11;--dxi-border:rgba(250,250,250,0.08);--dxi-border-strong:rgba(250,250,250,0.16);--dxi-text:#fafafa;--dxi-text-muted:#a1a1aa;--dxi-accent:#fb923c;--dxi-icon-filter:invert(1);}
html[data-theme="light"] .dioxus-icons-related{--dxi-bg:#ffffff;--dxi-panel:#fafafa;--dxi-border:rgba(24,24,27,0.08);--dxi-border-strong:rgba(24,24,27,0.16);--dxi-text:#18181b;--dxi-text-muted:#52525b;--dxi-accent:#ea580c;--dxi-icon-filter:none;}
.dioxus-icons-related-link{display:inline-flex;align-items:center;gap:8px;min-height:34px;padding:6px 10px;border-radius:10px;background:var(--dxi-panel);box-shadow:inset 0 0 0 1px var(--dxi-border);color:var(--dxi-text);font-size:13px;font-weight:600;text-decoration:none;line-height:1.2;transition:box-shadow 120ms ease,color 120ms ease;}
.dioxus-icons-related-link:hover{box-shadow:inset 0 0 0 1px var(--dxi-border-strong);color:var(--dxi-accent);text-decoration:none;}
.dioxus-icons-related-link img{width:20px;height:20px;flex:none;filter:var(--dxi-icon-filter);}
.dioxus-icons-widget-header{display:flex;flex-wrap:wrap;gap:16px;align-items:center;}
.dioxus-icons-widget-preview{display:grid;place-items:center;width:96px;height:96px;border-radius:12px;background:var(--dxi-bg);box-shadow:inset 0 0 0 1px var(--dxi-border);color:var(--dxi-text);flex:none;overflow:hidden;}
.dioxus-icons-widget-preview svg,.dioxus-icons-widget-preview img{max-width:100%;max-height:100%;}
.dioxus-icons-widget-controls{display:grid;grid-template-columns:repeat(3,minmax(120px,1fr));gap:12px;flex:1;min-width:280px;}
.dioxus-icons-widget label{display:grid;gap:6px;font:inherit;}
.dioxus-icons-widget-label{font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--dxi-text-subtle);}
.dioxus-icons-widget input{box-sizing:border-box;width:100%;border:0;border-radius:9px;background:var(--dxi-bg);box-shadow:0 0 0 1px var(--dxi-border);padding:9px 11px;color:var(--dxi-text);font:inherit;font-size:14px;outline:0;transition:box-shadow 120ms ease;}
.dioxus-icons-widget input:focus-visible{box-shadow:0 0 0 1px var(--dxi-accent),0 0 0 4px var(--dxi-accent-ring);}
.dioxus-icons-widget-output{position:relative;margin-top:14px;}
.dioxus-icons-widget pre{margin:0;padding:12px 14px;padding-right:120px;border-radius:10px;background:var(--dxi-bg);box-shadow:inset 0 0 0 1px var(--dxi-border);overflow-x:auto;font-size:13px;line-height:1.5;color:var(--dxi-text);}
.dioxus-icons-widget code{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;background:transparent;padding:0;}
.dioxus-icons-widget-copy{position:absolute;top:8px;right:8px;display:inline-flex;align-items:center;gap:6px;border:0;border-radius:8px;background:var(--dxi-accent);color:#ffffff;padding:7px 12px;font:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:background-color 120ms ease;}
.dioxus-icons-widget-copy:hover{background:var(--dxi-accent-hover);}
.dioxus-icons-widget-copy:focus-visible{outline:2px solid var(--dxi-accent-ring);outline-offset:2px;}
.dioxus-icons-widget-copy[data-copied="true"]{background:var(--dxi-accent-soft);color:var(--dxi-accent);}
.dioxus-icons-widget-copy svg{width:14px;height:14px;flex:none;}
@media (max-width:640px){.dioxus-icons-widget-controls{grid-template-columns:1fr;min-width:0;}.dioxus-icons-widget pre{padding-right:14px;}.dioxus-icons-widget-copy{position:static;margin-top:8px;width:100%;justify-content:center;}}
</style>
<script>
(function(){
if(window.__dioxusIconsWidgetReady){return;}
window.__dioxusIconsWidgetReady=true;
var COPY_ICON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
var CHECK_ICON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"></path></svg>';
function text(value){return String(value==null?"":value);}
function svgFor(container,size,color,stroke){var host=document.createElement("div");host.innerHTML=container.dataset.svg||"";var svg=host.firstElementChild;if(!svg){return "";}svg.setAttribute("width",size);svg.setAttribute("height",size);svg.setAttribute("stroke",color);svg.setAttribute("stroke-width",stroke);return svg.outerHTML;}
function render(container){
if(container.dataset.ready==="true"){return;}
container.dataset.ready="true";
var name=container.dataset.iconName||"Icon";
var sizeInput=container.querySelector("[data-di-size]");
var colorInput=container.querySelector("[data-di-color]");
var strokeInput=container.querySelector("[data-di-stroke]");
var preview=container.querySelector("[data-di-preview]");
var code=container.querySelector("[data-di-code]");
var copy=container.querySelector("[data-di-copy]");
var copyLabel=container.querySelector("[data-di-copy-label]");
var copyIcon=container.querySelector("[data-di-copy-icon]");
function update(){var size=text(sizeInput&&sizeInput.value||24);var color=text(colorInput&&colorInput.value||"currentColor");var stroke=text(strokeInput&&strokeInput.value||2);container.dataset.size=size;container.dataset.color=color;container.dataset.stroke=stroke;if(preview){preview.innerHTML=svgFor(container,size,color,stroke);}if(code){code.textContent=name+" { size: "+size+", color: \""+color+"\", stroke_width: "+stroke+" }";}}
[sizeInput,colorInput,strokeInput].forEach(function(input){if(input){input.addEventListener("input",update);}});
var copyTimer=null;
function showCopied(){if(copy){copy.dataset.copied="true";}if(copyLabel){copyLabel.textContent="Copied";}if(copyIcon){copyIcon.innerHTML=CHECK_ICON;}if(copyTimer){window.clearTimeout(copyTimer);}copyTimer=window.setTimeout(function(){if(copy){copy.dataset.copied="false";}if(copyLabel){copyLabel.textContent="Copy RSX";}if(copyIcon){copyIcon.innerHTML=COPY_ICON;}},1600);}
if(copyIcon){copyIcon.innerHTML=COPY_ICON;}
if(copy){copy.addEventListener("click",function(){var value=code?code.textContent:"";if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(value).then(showCopied,function(){});}else{var area=document.createElement("textarea");area.value=value;document.body.appendChild(area);area.select();try{document.execCommand("copy");showCopied();}catch(_){}area.remove();}});}
update();
}
function start(){document.querySelectorAll(".dioxus-icons-widget").forEach(render);}
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",start);}else{start();}
})();
</script>
