[workspace]
members = [
    "crates/dioxus-icons",
    "crates/dioxus-icons-codegen",
]
resolver = "3"

[workspace.package]
edition = "2024"
homepage = "https://github.com/evanalmloff/dioxus-icons"
keywords = ["dioxus", "lucide", "icons", "svg", "components"]
categories = ["gui", "web-programming", "wasm"]
license = "MIT"
repository = "https://github.com/evanalmloff/dioxus-icons"
version = "0.0.1"

[workspace.dependencies]
anyhow = "1.0.100"
base64 = "0.22.1"
# Public `dioxus-icons` support starts at Dioxus 0.7.7 and follows the
# compatible 0.7.x line. Keep default features off so the library does not
# select an app renderer for consumers.
dioxus = { version = "0.7.7", default-features = false, features = ["html", "macro"] }
dioxus-autofmt = "=0.7.7"
dioxus-rsx = "=0.7.7"
dioxus-rsx-rosetta = "=0.7.7"
# Required as a normal dependency by generated Dioxus props and RSX expansion.
dioxus-signals = "0.7.7"
lazy-js-bundle = "0.7.7"
proc-macro2 = "1.0.103"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
sha2 = "0.10.9"
ureq = "3.1.2"
zip = { version = "5.1.1", default-features = false, features = ["deflate"] }
