name: Nightly

on:
  schedule:
    - cron: "21 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    uses: ealmloff/dioxus-ci/.github/workflows/check.yml@68b5983fd6c83a02ed52638fe5063678ce8ad09c
    with:
      toolchain: nightly
      all-features: false
      all-targets: true

  test:
    uses: ealmloff/dioxus-ci/.github/workflows/test.yml@68b5983fd6c83a02ed52638fe5063678ce8ad09c
    with:
      toolchain: nightly

  clippy:
    uses: ealmloff/dioxus-ci/.github/workflows/clippy.yml@68b5983fd6c83a02ed52638fe5063678ce8ad09c
    with:
      toolchain: nightly
      all-features: false

  docs:
    uses: ealmloff/dioxus-ci/.github/workflows/docs.yml@68b5983fd6c83a02ed52638fe5063678ce8ad09c
    with:
      toolchain: nightly
      workspace: false
      package: dioxus-icons
      all-features: false
      document-private-items: false
