name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    uses: ealmloff/dioxus-ci/.github/workflows/check.yml@main
    with:
      all-features: false
      all-targets: true

  test:
    uses: ealmloff/dioxus-ci/.github/workflows/test.yml@main

  fmt:
    uses: ealmloff/dioxus-ci/.github/workflows/fmt.yml@main

  docs:
    uses: ealmloff/dioxus-ci/.github/workflows/docs.yml@main
    with:
      toolchain: stable
      workspace: false
      package: dioxus-icons
      all-features: false
      document-private-items: false

  clippy:
    uses: ealmloff/dioxus-ci/.github/workflows/clippy.yml@main
    with:
      all-features: false

  generated-and-package:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: Generated Output And Package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ealmloff/dioxus-ci/actions/setup-dioxus@main
      - name: Verify generated output is current
        run: ci/verify_codegen.sh
      - name: Build examples
        run: cargo build -p dioxus-icons --examples
      - name: Package dry run
        run: cargo package -p dioxus-icons
      - name: Validate packaged docs.rs build
        run: ci/validate_docsrs.sh

  picker:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: Docs Picker
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ealmloff/dioxus-ci/actions/setup-dioxus@main
      - name: Build docs with warnings denied
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps -p dioxus-icons
      - name: Install picker test dependencies
        working-directory: tests/playwright
        run: npm ci
      - name: Install Playwright browser
        working-directory: tests/playwright
        run: npx playwright install --with-deps chromium
      - name: Test docs picker
        working-directory: tests/playwright
        run: npm test
